<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <style>
    *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}


body {
    font-family: Arial, sans-serif;
    background: #eeeeee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    background: #ffe7bb;
    padding: 20px;
    border-radius: 12px;
    width: 340px;
    box-shadow: 0px 0px 5px 5px rgba(0,0,0,0.3);
}
.head{
    display: flex;
    justify-content: space-between;
}
.left{
    display: flex;
    gap: 1em;
}
.right{
    display: flex;
    gap: 1.5em;
    
}
 .right p{
    font-size: 1.5em;
}
.title {
    
    font-weight: bold;
    font-size: 20px;
    
}
.second-step{
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}
.second-step p{
    font-size: 1.5em;
    font-weight: 700;
}
.left2{
    display: flex;
    gap: 1em;
    align-items: center;
}
.right2 p{
    font-size: 1.5em;
    font-weight: 700;
}
input {
    width: 100%;
    height: 30px;
    margin-bottom: 15px;
    font-size: 22px;
    text-align: right;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #fff7e6;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: aliceblue;
    border: thin solid green;
    
}



.equal {
    grid-column: span 2;
    background: aliceblue;
    font-weight: bold;
}
.text{
    display: flex;
    justify-content: space-between;
    font-size: 1.4em;
    font-weight: 500;
    margin-bottom: 20px;
}
  </style>
  <body>
    <div class="calculator">
        <div class="head">
        <div class="left">
        <i class="fa-solid fa-calculator"></i>
      <div class="title"> Calculator</div>
      </div>
      <div class="right">
        <p>-</p>
        <p>x</p>
      </div>
      </div>
      <div class="second-step">
        <div class="left2">
        <i class="fa-solid fa-bars" ></i>
        <p>Standard ⁙</p>
        </div>
        <div class="right2">
         <p>●</p>
        </div>
      </div>
      <input type="text" id="input1"/>
      <input type="text"  id="result"/>
      <div class="text">
        <p>MC</p>
        <p>MR</p>
        <p>M+</p>
        <p>M-</p>
        <p>MS</p>
        <p>M-</p>
      </div>
      <div class="buttons">
        <button onclick="operator('%')">%</button>
        <button onclick="clearAll()">CE</button>
        <button onclick="clean('')">C</button>
        <button onclick="backspace()">⌫</button>

        <button onclick="operator('1/x')">1/x</button>
        <button onclick="operator('^')">x^2</button>
        <button onclick="operator('√')">√x</button>
        <button onclick="operator('÷')">÷</button>

        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="operator('x')">x</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="operator('-')">-</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="operator('+')">+</button>

        <button onclick="operator('±')">±</button>
        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="showAnswer()">=</button>

      </div>
    </div>

    <script> 
        let result = document.getElementById("result");
let input1 = document.getElementById("input1");
let canClear = false;

function press(value) {
  document.getElementById("result").value += value;

  if (canClear){
result.value = value;
canClear = false
  }

}

function clean(){
    result.value = '';
}
function clearAll(){
    result.value = "";
    input1.value = "";
}

let secondInp;
let opera = "";
function operator(operators) {
  secondInp = result.value;
  opera = operators;
  input1.value = secondInp + opera;
canClear = true
  result.value = "";

}
function backspace(){
   result.value = result.value.slice(0, -1)
}
function showAnswer  () {
  if (opera == "+") {
    input1.value = secondInp  + "+" + result.value ;
    result.value = Number(secondInp) + Number(result.value);
  } else if (opera == "-") {
    input1.value = secondInp + "-" + result.value;
    result.value = secondInp - result.value;
  }
  else if (opera == "x") {
    input1.value = secondInp + "x" + result.value;
    result.value = secondInp * result.value;
  }
   else if (opera == "÷") {
    input1.value = secondInp + "÷" + result.value;
    result.value = secondInp / result.value;
  } 
  else if (opera == "%") {
    input1.value = secondInp + "%" + result.value;
    result.value = secondInp % result.value;
}
else if (opera == "√"){
input1.value = secondInp + "√" + result.value;
result.value = secondInp  + Math.sqrt(result.value);
}
else if (opera == "^"){
input1.value = secondInp + "^" + result.value;
result.value = secondInp ** result.value
}
}




    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
.cards{
    border: 2px solid black;
    width: 340px;
    height: 600px;
    margin:  20px auto;
    border-radius: 20px;
    background-color: rgb(175, 170, 170);
    border: none;
    box-shadow: 0px 0px 3px 3px grey;
}
.card1{
    border: 2px solid black;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: auto;
    margin-top: 10px;
    background-color: white;
    position: relative;
    animation: rotate 0.2s linear infinite;
}
@keyframes rotate{
    0%{
        transform: rotate(0deg);
    }
    100%{
        transform: rotate(360deg);
    }
}
.blade{
    border: 2px solid black;
    width: 16px;
    height: 90px;
    margin: auto;
    background-color: gray;
    border-radius: 10px;
}
.card2{
    border: 2px solid black;
    width: 20px;
    background-color: gray;
    height: 160px;
    position: absolute;
    left: 678px;
    top: 220px;
    border: none;
}
.card3{
    border: 2px solid black;
    width: 42px;
    height: 140px;
    background-color: blue;
    border-radius: 10px;
    position: absolute;
    top: 385px;
    left: 668px;
    border: none;
}
.card4{
    border: 2px solid black;
    width: 100px;
    height: 50px;
    background-color: #4b4848;
    border-radius: 5px;
    position: absolute;
    top: 530px;
    left: 638px;
    border: none;
}
.card5{
 
    padding: 10px;
    
}
.card5 h3{
    text-align: center;
    
}
.card5 h3 a{
    background-color: blue;
    color: white;
    text-decoration: none;
border: 2px solid black;
padding: 5px;
padding-bottom: 10px;
border: none;

}
</style>
<body>
    <div class="cards">
<div class="card1">
    <div class="blade blade1"></div>
    <div class="blade blade2"></div>
</div>
<div class="card2"></div>
<div class="card3"></div>
<div class="card4">
    <div class="card5"><h3><a href="">ON</a></h3></div>
</div>
    </div>
</body>
</html>
